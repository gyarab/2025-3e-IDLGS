name: Code control

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: write

jobs:
    prettier:
        runs-on: ubuntu-latest
        name: 'Prettier @ ${{ github.ref_name }}'
        steps:
            - uses: actions/checkout@v4
            - name: Run Prettier
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: 'npm'
            - name: Install and format
              run: |
                  npm ci
                  npm run format
            - name: Commit changes
              run: |
                  git config --global user.email "actions@github.com"
                  git config --global user.name "IDLGS"
                  git add -A
                  if [[ -n $(git commit -am "[AUTOMATIC] Code formatting") ]]; then
                    echo "1=1"
                    echo "1=1" >> "$GITHUB_OUTPUT"
                  else
                    echo "0=1"
                    echo "0=1" >> "$GITHUB_OUTPUT"
                  fi
                  git push
    analysis:
        runs-on: ubuntu-latest
        name: 'Static Analysis @ ${{ github.ref_name }}'
        needs: prettier
        steps:
            - uses: actions/checkout@v4
            - name: 'Use Node.js 24'
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: 'npm'
            - name: 'Run ESLint'
              run: |
                  npm ci
                  npm run eslint
            - name: 'Make .env file'
              run: |
                  touch .env
                  echo DATABASE_URL=\"\" >> .env
                  echo CLOUDFLARE_SECRET=\"\" >> .env
                  echo DEFAULT_EMAIL=\"\" >> .env
                  echo DEFAULT_PASSWORD=\"\" >> .env
            - name: 'Run SvelteKit Check'
              run: |
                  npm run sveltekit
